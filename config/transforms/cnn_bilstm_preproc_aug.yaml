# @package _global_

to_tensor:
  _target_: emg2qwerty.transforms.ToTensor
  fields: [emg_left, emg_right]

normalize:
  _target_: emg2qwerty.transforms.EMGNormalize
  mode: none   # none | per_channel_zscore | global

gaussian_noise:
  _target_: emg2qwerty.transforms.AddGaussianNoise
  std: 0.0

amplitude_scale:
  _target_: emg2qwerty.transforms.RandomAmplitudeScale
  scale: 0.0   # 0.05 or 0.10

channel_dropout:
  _target_: emg2qwerty.transforms.RandomChannelDropout
  drop_prob: 0.0   # 0.10 or 0.25

band_rotation:
  _target_: emg2qwerty.transforms.ForEach
  transform:
    _target_: emg2qwerty.transforms.RandomBandRotation
    offsets: [-1, 0, 1]

temporal_jitter:
  _target_: emg2qwerty.transforms.TemporalAlignmentJitter
  max_offset: 120

logspec:
  _target_: emg2qwerty.transforms.LogSpectrogram
  n_fft: 64
  hop_length: 16

specaug:
  _target_: emg2qwerty.transforms.SpecAugment
  n_time_masks: 3
  time_mask_param: 25
  n_freq_masks: 2
  freq_mask_param: 4

transforms:
  train:
    - ${to_tensor}
    - ${normalize}
    - ${gaussian_noise}
    - ${amplitude_scale}
    - ${channel_dropout}
    - ${band_rotation}
    - ${temporal_jitter}
    - ${logspec}
    - ${specaug}

  val:
    - ${to_tensor}
    - ${normalize}
    - ${logspec}

  test: ${transforms.val}